<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德行評語資料庫</title>
<style>
body{
  margin:0;
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:#f3f6f8;
  color:#182331;
  line-height:1.7;
}
.wrap{
  max-width:860px;
  margin:0 auto;
  padding:40px 20px 56px;
}
h1{
  margin:0 0 10px;
  font-size:2rem;
}
p{
  color:#607083;
}
.list{
  display:grid;
  gap:12px;
  margin-top:24px;
}
.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:16px;
  background:#fff;
  border:1px solid #dbe4ec;
  border-radius:8px;
}
.meta strong{
  display:block;
  margin-bottom:4px;
}
.meta span{
  color:#607083;
  font-size:.95rem;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  padding:8px 14px;
  border-radius:8px;
  border:1px solid #dbe4ec;
  background:#176f75;
  color:#fff;
  text-decoration:none;
  font-weight:700;
  white-space:nowrap;
}
.back{
  margin-top:28px;
}
@media (max-width:700px){
  .item{
    display:block;
  }
  .btn{
    margin-top:12px;
  }
}
</style>
</head>
<body>
<main class="wrap">
  <h1>德行評語資料庫</h1>
  <p>此頁整理教學網頁引用的評語參考資料，方便在 GitHub Pages 上直接開啟。</p>
  <section class="list">
    <div class="item">
      <div class="meta">
        <strong>德性評語總整理（超完整）</strong>
        <span>正向特質、責任感、服務精神、領導能力與學術能力語庫。</span>
      </div>
      <a class="btn" href="德性評語總整理(超完整).pdf">開啟 PDF</a>
    </div>
    <div class="item">
      <div class="meta">
        <strong>導師評語參考文本</strong>
        <span>成績表現、幹部表現、人際互動與活動表現的句型參照。</span>
      </div>
      <a class="btn" href="導師評語參考文本.pdf">開啟 PDF</a>
    </div>
    <div class="item">
      <div class="meta">
        <strong>麗山高中導師評語對照表</strong>
        <span>性情、向學、進取、紀律、交友、服務與擅長等校內代碼。</span>
      </div>
      <a class="btn" href="麗山高中導師評語對照表.pdf">開啟 PDF</a>
    </div>
    <div class="item">
      <div class="meta">
        <strong>網路德性評語總集合</strong>
        <span>大量常見評語句型，適合取材後改寫成導師自己的語氣。</span>
      </div>
      <a class="btn" href="網路德性評語總集合.pdf">開啟 PDF</a>
    </div>
  </section>
  <div class="back">
    <a class="btn" href="../../../index.html">返回教學首頁</a>
  </div>
</main>
</body>
</html>
