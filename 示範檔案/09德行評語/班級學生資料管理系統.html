<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班級學生資料管理系統｜導師德性評語參考</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root{
  --bg:#f4f6fb; --panel:#ffffff; --ink:#1f2937; --muted:#6b7280; --line:#e3e8f0;
  --brand:#2f5fa6; --brand-d:#244c86; --accent:#0e9488; --warn:#c2410c; --danger:#b91c1c;
  --pos:#0e7490; --neg:#9a3412; --chip:#eef3fb; --shadow:0 1px 3px rgba(20,40,80,.08),0 6px 24px rgba(20,40,80,.06);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:13px}
.app{display:flex;min-height:100vh}
/* ---- Sidebar ---- */
.side{width:262px;background:linear-gradient(180deg,#26375a,#1d2c49);color:#dce4f2;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.side h1{font-size:16px;margin:0;padding:18px 18px 4px;letter-spacing:.5px}
.side .sub{font-size:11.5px;color:#9fb0cf;padding:0 18px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.classbox{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08);font-size:12px}
.classbox label{display:block;color:#9fb0cf;margin:6px 0 2px}
.classbox input{width:100%;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff}
.roster{flex:1;overflow-y:auto;padding:8px}
.roster .rtitle{display:flex;justify-content:space-between;align-items:center;color:#9fb0cf;font-size:11.5px;padding:6px 8px}
.stu{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:#e8edf7;margin-bottom:2px;border:1px solid transparent}
.stu:hover{background:rgba(255,255,255,.07)}
.stu.active{background:#3a72c4;border-color:#5b8fd9}
.stu .no{font-variant-numeric:tabular-nums;font-weight:700;background:rgba(255,255,255,.14);border-radius:5px;padding:1px 6px;font-size:12px;min-width:26px;text-align:center}
.stu .nm{flex:1;font-size:13.5px}
.stu .pct{font-size:10.5px;color:#bcd0f0}
.stu .pct.g{color:#6ee7a8}.stu .pct.y{color:#ffd98a}.stu .pct.r{color:#ff9a9a}
.searchbox{padding:8px 12px 4px}
.searchbox input{width:100%;padding:6px 9px;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;font-size:12.5px}
.searchbox input::placeholder{color:#9fb0cf}
.savestat{font-size:11px;color:var(--muted);font-weight:500;margin-left:4px}
.print-only{display:none}
.side .foot{padding:10px 12px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-wrap:wrap;gap:6px}
.side .foot button{flex:1;min-width:0;font-size:11.5px;padding:7px 4px;border:none;border-radius:7px;background:rgba(255,255,255,.1);color:#e8edf7}
.side .foot button:hover{background:rgba(255,255,255,.2)}
/* ---- Main ---- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:20}
.topbar .title{font-weight:700;font-size:15px;margin-right:auto;display:flex;align-items:center;gap:10px}
.topbar .title .badge{font-size:11px;font-weight:600;color:#fff;background:var(--accent);border-radius:20px;padding:2px 9px}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 12px;border-radius:8px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.btn:hover{border-color:var(--brand);color:var(--brand)}
.btn.pri{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.pri:hover{background:var(--brand-d);color:#fff}
.btn.gr{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.gr:hover{filter:brightness(.93)}
.btn.sm{padding:4px 9px;font-size:11.5px}
.btn.ghost{background:transparent;border-style:dashed;color:var(--muted)}
.content{padding:20px;max-width:1180px;width:100%;margin:0 auto}
/* empty */
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty .big{font-size:46px;margin-bottom:10px}
.empty h2{color:var(--ink);margin:.2em 0}
.empty .cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
/* student header */
.shead{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;box-shadow:var(--shadow);margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.shead .avatar{width:46px;height:46px;border-radius:12px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.shead .nmeta{display:flex;flex-direction:column}
.shead .nmeta .nm{font-size:19px;font-weight:700}
.shead .nmeta .sub{font-size:12px;color:var(--muted)}
.shead .sp{flex:1}
.shead .semsel{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.shead select{padding:6px 8px;border-radius:7px;border:1px solid var(--line)}
/* card / section */
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.card>h3{margin:0;padding:11px 16px;font-size:14px;background:linear-gradient(90deg,#eef3fb,#f7faff);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.card>h3 .ic{color:var(--brand)}
.card>h3 .sp{flex:1}
.card .body{padding:14px 16px}
/* 摺疊 */
.htitle{cursor:pointer;display:inline-flex;align-items:center;gap:8px;user-select:none}
.htitle:hover{color:var(--brand)}
.caret{font-size:11px;color:var(--muted);transition:transform .15s;display:inline-block}
.card:not(.collapsed) .caret,.selfsem:not(.collapsed) .caret{transform:rotate(90deg)}
.card.collapsed .body{display:none}
.selfsem .semtag{cursor:pointer;user-select:none}
.selfsem.collapsed .selfbody{display:none}
.selfsem.collapsed{padding-bottom:10px}
/* field grid */
.fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px 14px}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:11.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:4px}
.fld input,.fld textarea{border:1px solid var(--line);border-radius:7px;padding:7px 9px;width:100%;background:#fcfdff}
.fld input:focus,.fld textarea:focus,.grid textarea:focus{outline:2px solid #bcd2f3;border-color:var(--brand)}
.fld textarea{resize:vertical;min-height:38px}
.self2{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
@media(max-width:680px){.self2{grid-template-columns:1fr}}
.selfsem{border:1px solid var(--line);border-radius:10px;padding:10px 12px 12px;margin-bottom:12px;background:#fbfcfe}
.selfsem .semtag{display:inline-block;font-weight:700;font-size:12px;color:#fff;background:var(--brand);border-radius:6px;padding:2px 10px;margin-bottom:8px}
table.grid.fixed{table-layout:fixed}
.delfield{color:var(--danger);cursor:pointer;font-size:11px;opacity:.5;margin-left:auto}
.delfield:hover{opacity:1}
/* grid table */
.gridwrap{overflow-x:auto}
table.grid{border-collapse:collapse;width:100%;min-width:560px}
table.grid th,table.grid td{border:1px solid var(--line);padding:0;vertical-align:top}
table.grid th{background:#f3f6fc;font-size:12px;font-weight:700;padding:7px 8px;position:relative;white-space:nowrap}
table.grid td.semcell{background:#fafcff;font-weight:700;font-size:12px;text-align:center;color:var(--brand);white-space:nowrap;padding:6px 8px;width:62px}
table.grid td.semcell.hi{background:#fff3e0;color:var(--warn)}
table.grid textarea{width:100%;border:none;background:transparent;padding:6px 7px;resize:vertical;min-height:34px;display:block}
.dutysel{width:100%;border:none;border-bottom:1px dashed var(--line);background:#f3f8ff;color:var(--brand);font-size:11px;padding:3px 5px;cursor:pointer;display:block}
.dutysel:hover{background:#e7f0ff}
.colmenu{position:absolute;top:3px;right:3px;cursor:pointer;color:var(--muted);font-size:11px;opacity:.45}
.colmenu:hover{opacity:1;color:var(--danger)}
.rowdel{cursor:pointer;color:var(--danger);opacity:.4;font-size:11px}
.rowdel:hover{opacity:1}
.addrow{padding:6px}
/* trait picker for teacher comment */
.tcwrap{display:grid;grid-template-columns:1fr;gap:10px}
.tcrow{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.picker{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 0;border-top:1px dashed var(--line)}
.picker .grp{display:flex;align-items:center;gap:4px}
.picker select{padding:5px 7px;border-radius:6px;border:1px solid var(--line);max-width:150px}
.picker select.pos{border-color:#7dd3c8}
.picker select.neg{border-color:#e7b39a}
.hint{font-size:11px;color:var(--muted)}
/* 評語草稿暫存區 */
.draftblk{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:12px;background:#fbfdff}
.drafthd{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.drafthd b{font-size:13px;margin-right:auto;color:var(--brand)}
.draftta{width:100%;min-height:88px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;resize:vertical;background:#fff;font-size:13px;line-height:1.75}
.draftta:focus{outline:2px solid #bcd2f3;border-color:var(--brand)}
.draftft{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px;font-size:11.5px;color:var(--muted)}
.draftft select,.promptcustom{padding:4px 6px;border:1px solid var(--line);border-radius:6px;font-size:11.5px;max-width:220px}
.promptcustom{min-width:170px}
.aibtn{background:#eef3fb;border:1px solid #cfe0f5;color:#244c86}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,30,55,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:#fff;border-radius:14px;max-width:760px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{margin:0;padding:15px 20px;border-bottom:1px solid var(--line);font-size:16px;display:flex;align-items:center}
.modal h3 .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
.modal .mbody{padding:18px 20px}
.modal .mfoot{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;background:#fafbfe;position:sticky;bottom:0}
.modal table{border-collapse:collapse;width:100%;font-size:12.5px}
.modal table th,.modal table td{border:1px solid var(--line);padding:6px 8px;text-align:left}
.modal table th{background:#f3f6fc}
.modal select,.modal input[type=text]{padding:5px 7px;border:1px solid var(--line);border-radius:6px;width:100%}
.steps{font-size:13px;color:var(--muted);margin-bottom:12px}
.filedrop{border:2px dashed var(--line);border-radius:10px;padding:22px;text-align:center;color:var(--muted);background:#fafcff;cursor:pointer}
.filedrop:hover{border-color:var(--brand);color:var(--brand)}
.chiplist{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{background:var(--chip);border:1px solid #d6e2f4;border-radius:20px;padding:3px 10px;font-size:11.5px}
.note{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:8px;padding:9px 12px;font-size:12px;margin:10px 0}
.ok{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;border-radius:8px;padding:9px 12px;font-size:12px;margin:10px 0}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:200;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;bottom:30px}
.tag{display:inline-block;background:var(--chip);border:1px solid #d6e2f4;border-radius:6px;padding:1px 7px;font-size:11px;margin:1px 2px}
kbd{background:#eef1f6;border:1px solid #d7dde7;border-bottom-width:2px;border-radius:5px;padding:0 5px;font-size:11px}
/* print */
@media print{
  @page{margin:10mm}
  .side,.topbar,.shead .semsel,.no-print,.picker,.colmenu,.rowdel,.delfield,.addrow,.caret,#card_draft{display:none!important}
  .print-only{display:block!important}
  #printHead{text-align:center;margin:0 0 8px;border-bottom:2px solid #333;padding-bottom:6px}
  #printHead .phline{font-size:15px;font-weight:700}
  #printHead .phsub{font-size:11px;color:#444;margin-top:2px}
  .card.collapsed .body,.selfsem.collapsed .selfbody{display:block!important}
  .app,.main,.content{display:block;margin:0;padding:0;max-width:none}
  body{background:#fff;font-size:11px}
  /* 緊密排列，不留大段空白 */
  .shead{margin:0 0 6px;padding:6px 8px;box-shadow:none;border:1px solid #999;gap:8px}
  .card{box-shadow:none;border:1px solid #999;break-inside:auto;margin:0 0 6px}
  .card>h3{background:#eee!important;padding:4px 8px;font-size:12px}
  .card .body{padding:6px 8px}
  .selfsem{margin-bottom:6px;padding:6px 8px}
  .self2,.fields{gap:4px 12px}
  /* 欄位/儲存格依文字長度自動放大，文字完整顯示 */
  .fld textarea,.fld input{border:none!important;background:transparent!important;padding:2px 0;field-sizing:content;height:auto!important;min-height:0!important;width:auto!important;max-width:100%;white-space:pre-wrap;overflow:visible!important;resize:none}
  table.grid{min-width:0!important;width:100%}
  table.grid.fixed{table-layout:auto!important}
  table.grid colgroup,table.grid col{width:auto!important}
  table.grid th{padding:3px 6px}
  table.grid td.semcell{padding:3px 6px;width:auto}
  table.grid td,table.grid th{white-space:normal;word-break:break-word;vertical-align:top}
  table.grid textarea{field-sizing:content;height:auto!important;min-height:0!important;white-space:pre-wrap;word-break:break-word;overflow:visible!important;border:none!important;background:transparent!important;resize:none;padding:3px 6px}
  table,tr{break-inside:auto}
  tr{break-inside:avoid}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <h1>班級學生資料管理系統</h1>
    <div class="sub">臺北市麗山高中林獻升老師製作</div>
    <div class="classbox">
      <label>班級名稱</label><input id="m_class" placeholder="例：高二仁">
      <label>導師</label><input id="m_teacher" placeholder="請輸入導師姓名">
    </div>
    <div class="searchbox"><input id="m_search" placeholder="🔍 搜尋姓名 / 座號" oninput="renderRoster()"></div>
    <div class="roster" id="roster"></div>
    <div class="foot">
      <button onclick="openImport()">📥 匯入資料</button>
      <button onclick="exportClassJSON()">💾 備份班級</button>
      <button onclick="addBlankStudent()">＋ 新增學生</button>
      <button onclick="confirmClearAll()">🗑 清空</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="title">📋 學生資料表 <span class="badge" id="countBadge">0 人</span> <span id="saveStat" class="savestat no-print"></span></div>
      <button class="btn" onclick="openAICfg()">⚙ AI 設定</button>
      <button class="btn" onclick="openImport()">📥 匯入</button>
      <button class="btn" onclick="openSectionPicker('print')">🖨 列印</button>
      <button class="btn" onclick="openSectionPicker('excel')">📊 匯出 Excel</button>
      <button class="btn" onclick="openSectionPicker('excelAll')">📚 匯出全班</button>
      <button class="btn" onclick="exportStudentJSON()">🧩 匯出 JSON</button>
    </div>
    <div id="printHead" class="print-only"></div>
    <div class="content" id="content"></div>
  </main>
</div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   1. 常數、學期、評語詞庫（取自 Google 表單代碼詞庫）
   ========================================================= */
const SEMS = ['高一上','高一下','高二上','高二下','高三上','高三下'];

function parseTraits(str){
  // 將 "101端莊有禮 102外圓內方 ..." 轉成 [{code:'101',word:'端莊有禮'}]
  return str.trim().split(/\s+/).map(t=>{
    const m=t.match(/^(\d+)(.+)$/);
    return m?{code:m[1],word:m[2]}:{code:'',word:t};
  });
}
const TRAITS = {
  性情_正向: parseTraits('101端莊有禮 102外圓內方 103稟性善良 104溫文謙和 105溫順忠厚 106溫文爾雅 107溫和樸實 108和善敦睦 109勤勞儉樸 110誠正勤樸 111熱誠正直 112誠懇坦率 113沈靜溫和 114沈著鎮靜 115沈默負責 116沈默內向 117剛毅木訥 118文靜篤實 119文質彬彬 120內向自律 121不矜不伐 122持躬謹嚴 123處世平和 124舉止端莊 125舉止大方 126胸襟開闊 127穩健練達 128忠厚誠懇 129剛毅渾厚 130剛毅沈著 131活潑爽朗 132活潑天真 133活潑外向 134耿介直爽 135樂天安閒 136胸襟開闊 137胸襟豁達 138慷慨直爽 139坦白直爽 140博學正直 141心地善良 142能知自勉 143光明磊落 144老成持重 145才思敏捷 146能當重任 147深具自信 148精明能幹 149善體人意 150靈敏急智 151氣質不凡 152卓爾不群'),
  性情_負向: parseTraits('201稚氣未泯 202玩世不恭 203不拘小節 204恃才傲物 205豪放不拘 206憨直衝動 207安少躁多 208心浮氣躁 209心氣不定 210好動剛直 211性急好動 212舉止輕佻 213衝動易怒 214心直口快 215放蕩不羈 216倔強固執 217處事主觀 218我行我素 219自行其是 220落落寡合 221剛愎自用 222不善表達 223閒話稍多 224言多行少 225言多過實 226言行隨便 228強辭好辯 229意志不堅 230意志消沉 231少有主見 232優柔寡斷 233易受影響 234缺乏信心 235自暴自棄 236生活散漫 237敷衍草率 238草率從事 239浮華不實 240固執不通 241嬉遊無度 242聰明貪玩 243荒廢學業 244舍本逐末 245情緒不穩 246精神不振 247神情慵倦 248感情用事 250輕率急躁 251輕浮散慢 252孤僻成性'),
  向學_正向: parseTraits('301學業優良 302品學兼優 303敦品勵學 304學行俱佳 305學習有方 306學習專心 307學習認真 308勤學用功 309敏而好學 310多才多藝 311好學多聞 312好學靈敏 313博學慎思 314涉獵廣博 315求學踏實 316機敏好學 317熟讀深思 318理解力強 319博學多聞 320天資聰穎 321聰明伶俐 322求知慾強 323專心致志 324勤學有恒 325富於研究 326好學不倦 327敬業樂群 328勤勉有功 329勤學多問 330日有進步'),
  向學_待加強: parseTraits('351尚知用功 352學業尚可 353勉能應付 354尚知認真 355學行尚佳 356須多努力 357加強學習 358聽課不專 359不求甚解 360粗心大意 361輕忽學業 362時學時輟 363貪玩怠學 364心猿意馬 365上課多言 366心不專一 367作業草率 368作業常缺 369經常遲到 370缺曠過多'),

/* 基本資料欄位排序：父姓名→父手機→住家電話→母姓名→母手機（讓母欄對齊父欄） */
const BASIC_FIELD_ORDER=['手機','住址','身分證字號','生日','畢業學校','備註','父姓名','父手機','住家電話','母姓名','母手機'];
function reorderBasicFields(s){
  const cur=(s.schema&&s.schema.basic&&s.schema.basic.fields)||[];
  const inPref=BASIC_FIELD_ORDER.filter(f=>cur.includes(f));
  const extras=cur.filter(f=>!BASIC_FIELD_ORDER.includes(f));
  s.schema.basic.fields=[...inPref,...extras];
}
/* 重新套用內建區塊的版面旗標（不動使用者自訂的欄/列） */
function normalizeSchema(s){
  for(const k of Object.keys(DEFAULT_SCHEMA)){
    const d=DEFAULT_SCHEMA[k]; if(!s.schema[k])continue;
    for(const flag of ['fixed','narrow','narrowW','noSemFilter']){
      if(d[flag]!==undefined)s.schema[k][flag]=structuredClone(d[flag]);
      else delete s.schema[k][flag];
    }
  }
}
function blankState(){
  return {meta:{className:'',teacher:'',updatedAt:null},
          schema:structuredClone(DEFAULT_SCHEMA), customSections:[], students:[], ui:{currentId:null,sem:'全部'}};
}
function loadState(){
  try{const s=JSON.parse(localStorage.getItem(LS_KEY));
    if(s&&s.students){ // 補齊缺漏 schema
      s.schema=Object.assign(structuredClone(DEFAULT_SCHEMA),s.schema||{});
      normalizeSchema(s); // 重新套用版面旗標（fixed/narrow/noSemFilter）
      s.customSections=s.customSections||[];
      s.ui=s.ui||{currentId:null,sem:'全部'};
      migrateTeacherCols(s); // 德性描述+德性表現 → 文字描述評語
      migrateSelfSem(s);     // 自評由全域改為分學期
      migrateGradeCols(s);   // 成績排名改為班排/類組排
      reorderBasicFields(s); // 基本資料欄位排序（母欄對齊父欄）
      return s;}
  }catch(e){}
  return blankState();
}
/* 舊資料遷移：德性描述+德性表現→文字描述評語；備註→評語代號並移到最左 */
function migrateTeacherCols(s){
  const cols=s.schema.teacher.cols;
  const needMerge=cols.includes('德性描述')||cols.includes('德性表現');
  const needRename=cols.includes('備註');
  if(!needMerge&&!needRename)return;
  for(const st of s.students){
    const t=(st.data&&st.data.teacher)||{};
    for(const row of Object.keys(t)){
      const cell=t[row]||{};
      if(needMerge){
        const parts=[cell['德性描述'],cell['德性表現'],cell['文字描述評語']].map(x=>(x||'').trim()).filter(Boolean);
        const merged=[...new Set(parts)].join('　');
        if(merged)cell['文字描述評語']=merged;
        delete cell['德性描述'];delete cell['德性表現'];
      }
      if(needRename){
        if((cell['備註']||'').trim()&&!(cell['評語代號']||'').trim())cell['評語代號']=cell['備註'];
        delete cell['備註'];
      }
    }
  }
  // 重建欄序：評語代號、文字描述評語、日常表現、特殊表現，保留其餘自訂欄
  const canonical=['評語代號','文字描述評語','日常表現','特殊表現'];
  const drop=['德性描述','德性表現','備註',...canonical];
  s.schema.teacher.cols=[...canonical, ...cols.filter(c=>!drop.includes(c))];
}
/* 舊資料遷移：自評由「全域單一」改為「分六學期」。舊的扁平自評併入高一上。 */
function migrateSelfSem(s){
  for(const st of s.students){
    const self=st.data&&st.data.self; if(!self)continue;
    const alreadySem=SEMS.some(sm=>sm in self);
    if(alreadySem)continue;
    const flatFields=DEFAULT_SCHEMA.self.fields.filter(f=>f in self);
    if(flatFields.length||('_extra'in self)){
      const moved={_extra:self._extra||{}};
      for(const f of DEFAULT_SCHEMA.self.fields) if(f in self)moved[f]=self[f];
      st.data.self={'高一上':moved};
    }
  }
}
/* 舊資料遷移：成績排名單欄 → 班排/類組排雙欄 */
function migrateGradeCols(s){
  const g=s.schema.grade; if(!g)return;
  if(!g.cols.includes('一段考排名'))return;
  for(const st of s.students){
    const gd=(st.data&&st.data.grade)||{};
    for(const row of Object.keys(gd)){
      const cell=gd[row]||{};
      const mv=(o,n)=>{if((cell[o]||'').trim()&&!(cell[n]||'').trim())cell[n]=cell[o];delete cell[o];};
      mv('一段考排名','一段考班排');mv('二段考排名','二段考班排');mv('期末考排名','期末考班排');delete cell['學期排名'];
    }
  }
  g.cols=['一段考班排','一段考類組排','二段考班排','二段考類組排','期末考班排','期末考類組排','較強科目','較弱科目'];
}
let saveT;
function timeHM(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function save(){
  const el=document.getElementById('saveStat'); if(el)el.textContent='儲存中…';
  clearTimeout(saveT);saveT=setTimeout(()=>{
    state.meta.updatedAt=new Date().toISOString();
    try{localStorage.setItem(LS_KEY,JSON.stringify(state)); if(el)el.textContent='已儲存 '+timeHM();}
    catch(e){ if(el)el.textContent='⚠ 未儲存，請備份'; toast('⚠ 儲存失敗（空間可能已滿）：'+e.message+'，請用「💾 備份班級」匯出 JSON 保存。');}
  },250);
}

function uid(){return 's'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

/* 建立空白學生資料骨架 */
function newStudent(no,name,gender){
  const st={id:uid(),no:no||'',name:name||'',gender:gender||'',data:{}};
  for(const sec of Object.keys(DEFAULT_SCHEMA)){
    if(sec==='basic'){st.data.basic={};}
    else if(sec==='self'){st.data.self={};} // 學生自評改為分學期：{ '高一上':{個性..,_extra:{}} }
    else{st.data[sec]={};}
  }
  return st;
}
function ensureStudentShape(st){
  st.data=st.data||{};
  for(const sec of Object.keys(DEFAULT_SCHEMA)){
    if(sec==='basic')st.data.basic=st.data.basic||{};
    else if(sec==='self')st.data.self=st.data.self||{};
    else st.data[sec]=st.data[sec]||{};
  }
  for(const cs of (state.customSections||[])) st.data[cs.id]=st.data[cs.id]||{};
}
/* 取得/建立某學期的自評資料桶 */
function selfBucket(st,sem){
  st.data.self=st.data.self||{};
  st.data.self[sem]=st.data.self[sem]||{_extra:{}};
  st.data.self[sem]._extra=st.data.self[sem]._extra||{};
  return st.data.self[sem];
}
/* 所有 grid 型區塊（內建 + 自訂），供匯出/篩選使用 */
function allGridSections(){
  const built=[['duty','二、職位工作'],['teacher','三、導師評語'],['special','五、特殊表現'],['grade','六、成績表現'],['mock','七、學測模考'],['club','八、社團活動'],['project','九、專題研究（科展競賽）']];
  return built.concat((state.customSections||[]).map(cs=>[cs.id,cs.title]));
}

function pctComplete(st){
  // 粗略完成度：基本資料 + 自評八項 填了幾格
  let total=state.schema.basic.fields.length+state.schema.self.fields.length,filled=0;
  for(const f of state.schema.basic.fields) if((st.data.basic[f]||'').trim())filled++;
  const self=st.data.self||{};
  for(const f of state.schema.self.fields) if(SEMS.some(sm=>((self[sm]||{})[f]||'').trim()))filled++;
  return Math.round(filled/total*100);
}
function renderRoster(){
  const r=$('#roster'); if(!r)return;
  const q=(($('#m_search')||{}).value||'').trim().toLowerCase();
  let sorted=[...state.students].sort((a,b)=>(a.no||'').localeCompare(b.no||'','zh',{numeric:true}));
  if(q)sorted=sorted.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.no||'').toLowerCase().includes(q));
  let h=`<div class="rtitle"><span>學生名冊（${state.students.length}${q?'，符合 '+sorted.length:''}）</span></div>`;
  if(!state.students.length){h+=`<div style="color:#9fb0cf;font-size:12px;padding:10px 8px;line-height:1.7">尚無學生。<br>請按下方「📥 匯入資料」匯入名冊 Excel，或「＋ 新增學生」。</div>`;}
  else if(!sorted.length){h+=`<div style="color:#9fb0cf;font-size:12px;padding:10px 8px">找不到符合「${esc(q)}」的學生。</div>`;}
  for(const st of sorted){
    const pct=pctComplete(st), cls=pct>=80?'g':pct>=40?'y':'r';
    h+=`<div class="stu ${st.id===state.ui.currentId?'active':''}" onclick="selectStudent('${st.id}')">
      <span class="no">${esc(st.no||'--')}</span>
      <span class="nm">${esc(st.name||'（未命名）')}</span>
      <span class="pct ${cls}">${pct}%</span></div>`;
  }
  r.innerHTML=h;
}

function dutyPick(sel,id,row,col){

function insertTrait(val){
  if(!val)return;

function clearDraft(id,key){ const s=byId(id); if(!s)return; const sem=getDraftSem(); if(!(draftBucket(s,sem)[key]||'').trim())return toast('草稿已是空的'); if(!confirm(`確定清除「${DRAFT_DEFS[key]}」草稿（${sem}）的所有文字？`))return; draftBucket(s,sem)[key]=''; openState[s.id+'|draft']=true; save(); renderContent(); toast('🧹 已清除草稿'); }

/* 去除得獎/獎懲字眼，只留下「參與了什麼」 */
function stripAwards(s){
  if(!s)return '';
  return String(s)
    .replace(/[（(][^）)]*(獎|名次|第[一二三四五六七八九十\d]+名|優|分|等)[^）)]*[）)]/g,'') // 去括號內含獎/名/優/分說明
    .replace(/(榮獲|獲得|榮獲頒|勇奪|奪得|得到)/g,'')
    .replace(/(特優|優等|優勝|甲等|乙等|丙等|佳作|入選|得獎|獲獎|金獎|銀獎|銅獎|金牌|銀牌|銅牌|獎牌|獎狀|獎項|大獎|首獎|冠軍|亞軍|季軍|殿軍|錦標|滿級分|[一二三]等獎|第[一二三四五六七八九十百\d]+名|前[一二三]名|名次第?\d*)/g,'')
    .replace(/[，,、；;。.\s]+$/,'').replace(/^[，,、；;。.\s]+/,'').replace(/\s{2,}/g,' ').trim();
}
/* 校內外活動 + 特殊/專題 的「參與項目」摘要（不含得獎細節） */
function summarizeActivities(st,sem){
  const ex=((st.data.self||{})[sem]||{})._extra||{};
  const items=[];
  const add=v=>{ const t=stripAwards((v||'').trim()); if(t)items.push(t); };
  ['學校服務','社團表現','學業表現','生活常規','校內其他特殊表現'].forEach(k=>add(ex[k]));   // 校內
  ['社會服務','活動表演','科學展覽','校外其他特殊表現'].forEach(k=>add(ex[k]));               // 校外
  add(((st.data.special||{})[sem]||{})['特殊表現']);                                          // 五、特殊表現（不取獎懲記錄）
  add(((st.data.project||{})[sem]||{})['活動與競賽']);                                        // 八、專題研究（不取獎懲記錄）
  return [...new Set(items.filter(Boolean))];
}
/* 本地整合：文字描述評語＝自評＋活動參與摘要＋成績，形成完整客觀觀察 */
function mergeComment(st,sem){
  const self=(st.data.self||{})[sem]||{};
  const descs=['個性','性情','向學','進取','紀律','交友','服務','擅長'].map(f=>(self[f]||'').trim()).filter(Boolean);
  const acts=summarizeActivities(st,sem);
  const g=(st.data.grade||{})[sem]||{};
  let s='';
  if(descs.length)s+='該生'+descs.join('、')+'。';
  if(acts.length)s+='本學期參與'+acts.join('、')+'等校內外活動，參與態度積極。';
  const rankBits=[];
  for(const e of ['一段考','二段考','期末考']){ const b=(g[e+'班排']||'').trim(), c=(g[e+'類組排']||'').trim(); if(b||c)rankBits.push(`${e}班排名${b||'—'}${c?('、類組'+c):''}`); }
  if(rankBits.length)s+='學業成績方面，'+rankBits.join('；')+'。';
  const strong=(g['較強科目']||'').trim(), weak=(g['較弱科目']||'').trim();
  if(strong)s+=`較強科目為${strong}；`;
  if(weak)s+=`較弱科目為${weak}，可再加強。`;
  return s.trim();
}
function mergeSpecial(st,sem){
  const parts=[];
  const duty=(st.data.duty||{})[sem]||{};
  const dutyBits=[duty['幹部'],duty['小老師']].map(x=>(x||'').trim()).filter(Boolean);
  if(dutyBits.length)parts.push('本學期擔任'+dutyBits.join('、'));
  const ex=((st.data.self||{})[sem]||{})._extra||{};
  const inS=['學校服務','社團表現','學業表現','生活常規','校內其他特殊表現'].map(k=>(ex[k]||'').trim()).filter(Boolean);
  if(inS.length)parts.push('校內表現：'+inS.join('、'));
  const outS=['社會服務','活動表演','科學展覽','校外其他特殊表現'].map(k=>(ex[k]||'').trim()).filter(Boolean);
  if(outS.length)parts.push('校外表現：'+outS.join('、'));
  const sp=(st.data.special||{})[sem]||{};
  const spBits=[sp['特殊表現'],sp['獎懲記錄']].map(x=>(x||'').trim()).filter(Boolean);
  if(spBits.length)parts.push('特殊表現：'+spBits.join('、'));
  const club=(st.data.club||{})[sem]||{};
  const clubBits=[club['社團'],club['職稱'],club['社團表現與活動']].map(x=>(x||'').trim()).filter(Boolean);
  if(clubBits.length)parts.push('社團活動：'+clubBits.join('、'));
  const pj=(st.data.project||{})[sem]||{};
  const pjBits=[pj['活動與競賽'],pj['獎懲記錄']].map(x=>(x||'').trim()).filter(Boolean);
  if(pjBits.length)parts.push('專題研究（科展競賽）：'+pjBits.join('、'));
  return parts.length? parts.join('；')+'。' : '';
}
function doMerge(id,key){
  const s=byId(id); if(!s)return; const sem=getDraftSem(); ensureStudentShape(s);
  const txt = key==='comment'?mergeComment(s,sem):mergeSpecial(s,sem);
  if(!txt)return toast('本學期此類欄位尚無資料可整合');

  openState[s.id+'|draft']=true; save(); renderContent(); toast('✓ 已整合本學期資訊到草稿');

function fillOfficial(id,key){

}

async function callAI(cfg,content){
  if(!cfg.apiKey)throw new Error('尚未設定 API 金鑰');
  if(cfg.provider==='gemini'){
    const model=cfg.model||AI_MODEL_PH.gemini;
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(cfg.apiKey)}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:content}]}]})});
    const j=await r.json(); if(!r.ok)throw new Error((j.error&&j.error.message)||('HTTP '+r.status));
    return (((j.candidates||[])[0]||{}).content||{}).parts?.[0]?.text||'';
  }
  if(cfg.provider==='openai'){
    const model=cfg.model||AI_MODEL_PH.openai;
    const r=await fetch('https://api.openai.com/v1/chat/completions',
      {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey},body:JSON.stringify({model,messages:[{role:'user',content}]})});
    const j=await r.json(); if(!r.ok)throw new Error((j.error&&j.error.message)||('HTTP '+r.status));
    return (((j.choices||[])[0]||{}).message||{}).content||'';
  }
  if(cfg.provider==='claude'){
    const model=cfg.model||AI_MODEL_PH.claude;
    const r=await fetch('https://api.anthropic.com/v1/messages',
      {method:'POST',headers:{'Content-Type':'application/json','x-api-key':cfg.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,max_tokens:1024,messages:[{role:'user',content}]})});
    const j=await r.json(); if(!r.ok)throw new Error((j.error&&j.error.message)||('HTTP '+r.status));
    return (((j.content||[])[0])||{}).text||'';
  }
  throw new Error('未知的 AI 服務');
}
async function doAIRefine(id,key){
  const cfg=getAICfg();
  if(!cfg.apiKey){ if(confirm('尚未設定 AI API 金鑰。要現在設定嗎？\n（也可用「複製(含提示詞)」貼到 ChatGPT／Gemini／Claude 網站）'))openAICfg(); return; }
  const s=byId(id), sem=getDraftSem(), d=draftBucket(s,sem);
  const text=(d[key]||'').trim(); if(!text)return toast('草稿是空的，請先「整合本學期資訊」');
  toast('✨ AI 潤飾中…請稍候');
  try{
    const out=await callAI(cfg,getPrompt(key)+'\n\n'+text);
    if(out&&out.trim()){ d[key]=out.trim(); openState[s.id+'|draft']=true; save(); renderContent(); toast('✓ AI 潤飾完成'); }
    else toast('AI 沒有回傳內容');
  }catch(e){ alert('AI 潤飾失敗：'+e.message+'\n\n可能原因：金鑰錯誤、模型名稱錯誤，或瀏覽器 CORS 限制。\n建議改用「複製(含提示詞)」貼到 AI 網站。'); }
}

  const inp=document.createElement('input');inp.type='file';
  inp.accept = type==='json'?'.json' : type==='docx'?'.docx' : '.xlsx,.xls,.csv';

// CSV → 二維陣列（全部視為文字，保留電話前導 0 與括號，避免被當數字）
function parseCSV(text){
  const rows=[]; let row=[],cur='',inQ=false;
  text=String(text).replace(/^﻿/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=ch; }
    else{
      if(ch==='"')inQ=true;
      else if(ch===','){row.push(cur);cur='';}
      else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else cur+=ch;
    }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function handleFile(type,file){
  const reader=new FileReader();
  const isCSV=/\.csv$/i.test(file.name);
  reader.onload=ev=>{
    try{
      if(type==='json')return importJSON(ev.target.result);
      if(type==='docx')return importDocx(ev.target.result,file.name);
      let wb;
      if(isCSV){ const ws=XLSX.utils.aoa_to_sheet(parseCSV(ev.target.result)); wb={SheetNames:['CSV'],Sheets:{CSV:ws}}; }
      else wb=XLSX.read(ev.target.result,{type:'array'});
      if(type==='roster')importRoster(wb);
      else if(type==='selfxlsx')importSelfXlsx(wb);
      else if(type==='form')importForm(wb);
      else if(type==='basicxlsx')importBasicXlsx(wb);
      else if(type==='prevcomment')importPrevComment(wb);
      else if(type==='gradexlsx')importGrade(wb);
      else if(type==='mockxlsx')importMock(wb);
      else if(type==='clubxlsx')importClub(wb);
    }catch(err){alert('匯入失敗：'+err.message);console.error(err);}
  };
  if(type==='json'||isCSV)reader.readAsText(file); // CSV 以 UTF-8 文字讀取
  else reader.readAsArrayBuffer(file);
}

function doImportRoster(hdrIdx){
  const ws=_rosterWB.Sheets[$('#rsSheet').value];

  const dataRows=rows.slice(hdrIdx+1).filter(r=>r.some(c=>String(c).trim()!==''));

  if($('#rsReplace').checked)state.students=[];
  if(!state.meta.className)state.meta.className=$('#rsSheet').value;
  let added=0,updated=0;
  for(const r of dataRows){
    const no=String(r[noCol]||'').trim(), name=String(r[nameCol]||'').trim();
    if(!name&&!no)continue;
    let s=state.students.find(x=>x.name===name&&name)||state.students.find(x=>x.no===no&&no&&!x.name);
    if(s){if(no)s.no=no;if(name)s.name=name;updated++;}

function guessFormTarget(h){

function guessGuardianGender(name){
  name=String(name||'').trim(); if(!name)return '?';
  const given=name.length>=2?name.slice(1):name; // 去掉姓氏第一字，掃描名

function importBasicXlsx(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  let HR=aoa.findIndex(r=>r.some(c=>GNORM(c).includes('座號'))&&r.some(c=>/姓名/.test(GNORM(c))));
  if(HR<0)HR=aoa.findIndex(r=>r.some(c=>/姓名/.test(GNORM(c))));
  if(HR<0){HR=0;}
  const hdr=aoa[HR];
  const cols=[]; hdr.forEach((h,i)=>{ const n=GNORM(h); if(n)cols.push({i,name:n}); });
  if(!cols.length)return alert('找不到欄位標題（需含「姓名」）。');
  _basicAOA={aoa,HR}; _basicCols=cols;
  const nameCol=cols.find(c=>/姓名/.test(c.name)&&!/監護|家長/.test(c.name));

  const targets=[['__name','★姓名（比對）'],['__no','座號（比對）'],['__gender','性別'],
    ['__guardian','監護人姓名（依關係自動分父/母）'],['__guardianphone','監護人電話（依關係自動分父/母）'],['__relation','關係（判別父/母用）'],
    ...BASIC_FIELDS.map(f=>['basic:'+f,'基本資料→'+f]),['basic:住家電話','基本資料→住家電話'],
    ['__newfield','＋ 以此欄標題新增欄位'],['__skip','— 不匯入 —']];
  const rowsHtml=cols.map((c,idx)=>{ const g=guessBasicTarget(c.name);
    return `<tr><td>${esc(c.name)}</td><td><select id="bm_${idx}">${targets.map(([v,l])=>`<option value="${v}" ${v===g?'selected':''}>${l}</option>`).join('')}</select></td></tr>`; }).join('');
  $('#impArea').innerHTML=`
    <div class="ok">已讀取基本資料，偵測 <b>${cnt}</b> 位學生（表頭位於第 ${HR+1} 列）。系統已自動猜測欄位對應：</div>

    <button class="btn pri" onclick="doImportBasic()">✓ 開始匯入</button>`;
}
function doImportBasic(){
  const {aoa,HR}=_basicAOA, cols=_basicCols;
  const colMap=cols.map((c,idx)=>$('#bm_'+idx).value);
  const colIdxOf=t=>{const k=colMap.indexOf(t);return k>=0?cols[k].i:-1;};
  const nameI=colIdxOf('__name'); if(nameI<0)return alert('請先指定「姓名」欄位。');
  const noI=colIdxOf('__no'), genI=colIdxOf('__gender');
  const gI=colIdxOf('__guardian'), gpI=colIdxOf('__guardianphone'), relI=colIdxOf('__relation');
  const addField=f=>{ if(!state.schema.basic.fields.includes(f))state.schema.basic.fields.push(f); };
  let matched=0,created=0;
  for(let r=HR+1;r<aoa.length;r++){
    const row=aoa[r];
    const name=String(row[nameI]||'').trim();
    const no=noI>=0?String(row[noI]||'').trim():'';
    if(!name&&!no)continue;
    let s=findStu(name,no);
    if(!s){s=newStudent(no,name,'');state.students.push(s);created++;}
    else matched++;
    ensureStudentShape(s);
    if(no&&!s.no)s.no=no;
    if(genI>=0){const g=String(row[genI]||'').trim();if(g&&!s.gender)s.gender=g;}
    // 一般欄位
    cols.forEach((c,idx)=>{
      const t=colMap[idx]; if(t!=='__newfield'&&!t.startsWith('basic:'))return;
      const val=String(row[c.i]||'').trim(); if(!val)return;
      const f= t==='__newfield'? c.name : t.slice(6);
      addField(f); s.data.basic[f]=val;
    });
    // 監護人依關係自動分父/母
    if(gI>=0||gpI>=0){
      const gname=gI>=0?String(row[gI]||'').trim():'';
      const gphone=gpI>=0?String(row[gpI]||'').trim():'';
      const rel=relI>=0?String(row[relI]||'').trim():'';
      if(gname||gphone){
        // 關係欄優先；無明確關係時，依監護人姓名文字意義自動判斷父/母（不確定預設父）
        let isMother;
        if(/父/.test(rel))isMother=false;
        else if(/母/.test(rel))isMother=true;
        else isMother=(guessGuardianGender(gname)==='F');
        const nf=isMother?'母姓名':'父姓名', pf=isMother?'母手機':'父手機';
        addField(nf);addField(pf);
        if(gname)s.data.basic[nf]=gname;
        if(gphone)s.data.basic[pf]=gphone;
      }
    }
  }
  reorderBasicFields(state); // 住家電話排到父手機右邊、母欄對齊父欄
  save();render();closeModal();
  toast(`✓ 基本資料匯入：更新 ${matched} 位、新增 ${created} 位`);
}

const GNORM=s=>String(s).replace(/[\s\n　]/g,'');
let _gradeAOA=null,_gradeCols=null;
function importGrade(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  let HR=aoa.findIndex(r=>r.some(c=>GNORM(c).includes('座號'))&&r.some(c=>/姓名/.test(GNORM(c))));
  if(HR<0)return alert('無法辨識段考成績表頭（需含「座號」與「姓名」）。');
  const hdr=aoa[HR].map(GNORM);
  const META=/座號|姓名|總分|平均|不及格|名次|進退|百分|備註|級分|學號/;
  const cols={
    no:hdr.findIndex(h=>h.includes('座號')),
    name:hdr.findIndex(h=>/姓名/.test(h)),
    ban:hdr.findIndex(h=>h.includes('班級')&&h.includes('名次')),
    cu:hdr.findIndex(h=>h.includes('類組')&&h.includes('名次')&&!h.includes('百分')),
    cupct:hdr.findIndex(h=>h.includes('類組')&&h.includes('百分')),
    subj:[]
  };
  if(cols.cu<0)cols.cu=hdr.findIndex(h=>(h.includes('全校')||h.includes('校'))&&h.includes('名次'));
  hdr.forEach((h,i)=>{ if(h&&!META.test(h)&&i!==cols.no&&i!==cols.name)cols.subj.push([i,h]); });
  _gradeAOA={aoa,HR}; _gradeCols=cols;
  const cnt=aoa.slice(HR+1).filter(r=>String(r[cols.name]||'').trim()).length;
  $('#impArea').innerHTML=`
    <div class="ok">已讀取段考成績，偵測 <b>${cnt}</b> 位學生。科目：${cols.subj.map(s=>s[1]).join('、')||'（未偵測，請確認檔案）'}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="fld" style="flex:1"><label>匯入到哪個學期</label><select id="grSem">${SEMS.map(s=>`<option ${s===state.ui.sem&&state.ui.sem!=='全部'?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="fld" style="flex:1"><label>哪一次考試</label><select id="grExam"><option>一段考</option><option>二段考</option><option>期末考</option></select></div>
    </div>
    <div class="note">較強科目＝該科 80 分(含)以上；較弱科目＝不及格（分數前有 #）。班排取「班級名次」、類組排取「類組名次（百分）」。同學期多次考試的相同科目會去重並標註出現次數，例如「數學(2)」。</div>
    <button class="btn pri" onclick="doImportGrade()">✓ 開始匯入</button>`;
}
function doImportGrade(){
  const sem=$('#grSem').value, exam=$('#grExam').value;
  const {aoa,HR}=_gradeAOA, c=_gradeCols;
  let matched=0,unmatched=[];
  for(let r=HR+1;r<aoa.length;r++){
    const row=aoa[r]; const name=String(row[c.name]||'').trim(), no=String(row[c.no]||'').trim();
    if(!name)continue;
    const s=findStu(name,no); if(!s){unmatched.push(name);continue;}
    ensureStudentShape(s);
    const strong=[],weak=[];
    for(const [i,sub] of c.subj){
      const raw=String(row[i]||'').trim(); if(!raw)continue;
      if(raw.indexOf('#')>=0)weak.push(sub);
      else{const n=parseFloat(raw.replace(/[^0-9.]/g,'')); if(!isNaN(n)&&n>=80)strong.push(sub);}
    }
    const ban=c.ban>=0?String(row[c.ban]||'').trim():'';
    let cu=c.cu>=0?String(row[c.cu]||'').trim():'';
    const pct=c.cupct>=0?String(row[c.cupct]||'').trim():'';
    if(cu&&pct)cu=cu+'（'+pct+'%）';
    s.data._exam=s.data._exam||{}; s.data._exam[sem]=s.data._exam[sem]||{};
    s.data._exam[sem][exam]={ban,cu,strong,weak};
    recomputeGrade(s,sem);
    matched++;
  }
  save();render();closeModal();
  toast(`✓ 段考成績匯入（${sem}・${exam}）：成功 ${matched} 位`+(unmatched.length?`，未找到 ${unmatched.length} 位`:''));
  if(unmatched.length)setTimeout(()=>alert('以下找不到對應學生，未匯入：\n'+unmatched.join('、')),300);
}
function recomputeGrade(s,sem){
  s.data.grade[sem]=s.data.grade[sem]||{};
  const g=s.data.grade[sem], ex=(s.data._exam||{})[sem]||{}, EXAMS=['一段考','二段考','期末考'];
  for(const e of EXAMS){ if(ex[e]){ g[e+'班排']=ex[e].ban||''; g[e+'類組排']=ex[e].cu||''; } }
  const tally=key=>{const m={};for(const e of EXAMS){for(const sub of ((ex[e]||{})[key]||[]))m[sub]=(m[sub]||0)+1;}
    return Object.entries(m).map(([sub,n])=>n>1?`${sub}(${n})`:sub).join('、');};
  g['較強科目']=tally('strong'); g['較弱科目']=tally('weak');
}

/* --- 個別 docx 自評表 --- */
function importDocx(arrayBuffer,fname){
  mammoth.convertToHtml({arrayBuffer}).then(res=>{
    const doc=new DOMParser().parseFromString(res.value,'text/html');
    const text=doc.body.innerText||doc.body.textContent||'';
    // 姓名 / 座號
    let name='',no='';
    let m=text.match(/姓名[:：]?\s*([^\s座號\n]{1,10})/);if(m)name=m[1].trim();
    m=text.match(/座號[:：]?\s*([0-9A-Za-z]{1,6})/);if(m)no=m[1].trim();
    // 八項自評：從表格抓「個性描述：xxx」
    const fields=['個性','性情','向學','進取','紀律','交友','服務','擅長'];
    const grabbed={};
    doc.querySelectorAll('td,p').forEach(td=>{
      const t=(td.innerText||td.textContent||'').trim();
      for(const f of fields){
        const re=new RegExp(f+'描述[:：]?\\s*(.+)','s');
        const mm=t.match(re);
        if(mm&&mm[1].trim())grabbed[f]=mm[1].trim();
      }
    });
    showDocxConfirm(name,no,grabbed,fname);
  }).catch(err=>alert('docx 解析失敗：'+err.message));
}
function showDocxConfirm(name,no,grabbed,fname){
  const got=Object.keys(grabbed);
  const candidates=state.students.map(s=>`<option value="${s.id}" ${s.name===name?'selected':''}>${esc(s.no)} ${esc(s.name)}</option>`).join('');

function importJSON(txt){
  let obj;try{obj=JSON.parse(txt);}catch(e){return alert('JSON 格式錯誤');}
  if(obj && obj.students && obj.schema){ // 整班備份
    if(!confirm(`將還原班級備份（${obj.students.length} 位學生），覆蓋目前資料？`))return;
    obj.schema=Object.assign(structuredClone(DEFAULT_SCHEMA),obj.schema);
    obj.ui=obj.ui||{currentId:null,sem:'全部'};
    state=obj;save();render();closeModal();toast('✓ 班級備份已還原');
  }else if(obj && obj.student){ // 單一學生
    const incoming=obj.student;
    let s=state.students.find(x=>x.name===incoming.name);
    if(s){if(!confirm(`覆蓋現有學生「${s.name}」的資料？`))return;Object.assign(s,incoming,{id:s.id});}
    else{incoming.id=uid();state.students.push(incoming);}
    save();render();closeModal();toast('✓ 已匯入學生 '+(incoming.name||''));
  }else alert('無法辨識的 JSON（需為本系統匯出的班級或學生備份）。');
}

   ========================================================= */
function exportClassJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  download(blob,safeName(`班級備份_${state.meta.className||'未命名'}_${dstamp()}`)+'.json');
  toast('✓ 已匯出班級備份 JSON');
}
function semFilterStudent(st){
  // 依目前檢視學期輸出子集（基本/自評恆含；grid 僅含該學期）
  const sem=state.ui.sem;
  let selfOut=st.data.self||{};
  if(sem!=='全部'){selfOut={}; if((st.data.self||{})[sem])selfOut[sem]=st.data.self[sem];}
  const out={id:st.id,no:st.no,name:st.name,gender:st.gender,semester:sem,data:{
    basic:st.data.basic, self:selfOut
  }};
  const gridIds=[...SECTION_ORDER.map(x=>x[0]).filter(s=>!['basic','self'].includes(s)), ...(state.customSections||[]).map(c=>c.id)];
  for(const sec of gridIds){
    out.data[sec]={};
    const rows= (state.schema[sec].noSemFilter||sem==='全部')?state.schema[sec].rows:[sem];
    for(const r of rows)if(st.data[sec]&&st.data[sec][r])out.data[sec][r]=st.data[sec][r];
  }
  if(st.data._exam)out.data._exam=st.data._exam;
  return out;
}
function exportStudentJSON(){
  const st=curStudent();if(!st)return toast('沒有選取學生');
  const payload={meta:{className:state.meta.className,teacher:state.meta.teacher,semester:state.ui.sem,exportedAt:new Date().toISOString()},student:semFilterStudent(st),schema:state.schema};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  download(blob,safeName(`${st.no||''}_${st.name||'學生'}_${state.ui.sem}`)+'.json');
  toast('✓ 已匯出 '+(st.name||'學生')+'（'+state.ui.sem+'）JSON');
}
// 依項目順序組出單一學生的 AOA（一→九→自訂，不可顛倒）
function buildStudentAOA(st,sel,sem){
  const aoa=[];
  aoa.push([`${state.meta.className||''} 學生資料表`,'','','']);
  aoa.push([`座號`,st.no||'',`姓名`,st.name||'',`性別`,st.gender||'']);
  aoa.push([`導師`,state.meta.teacher||'',`輸出學期`,sem,`輸出日`,dstamp()]);
  aoa.push([]);
  const orderList=[...SECTION_ORDER.map(([id,title,ic,kind])=>({id,title,kind})), ...(state.customSections||[]).map(c=>({id:c.id,title:c.title,kind:'grid'}))];
  for(const {id,title,kind} of orderList){
    if(!sel.has(id))continue;
    if(kind==='fields'){
      aoa.push([title]);
      const bf=state.schema[id].fields;
      for(let i=0;i<bf.length;i+=2){aoa.push([bf[i],(st.data[id]||{})[bf[i]]||'',bf[i+1]||'',bf[i+1]?((st.data[id]||{})[bf[i+1]]||''):'']);}
      aoa.push([]);
    }else if(kind==='self'){
      aoa.push([title]);
      const selfSems = sem==='全部'?SEMS:[sem];
      for(const sm of selfSems){
        const b=(st.data.self||{})[sm]||{};
        const hasCore=state.schema.self.fields.some(f=>(b[f]||'').trim());
        const exCols=state.schema.self.extra.filter(f=>((b._extra||{})[f]||'').trim());
        if(!hasCore&&!exCols.length)continue;
        aoa.push(['【'+sm+'】']);
        for(const f of state.schema.self.fields)aoa.push([f+'描述',b[f]||'']);
        if(exCols.length){aoa.push(['（自評補充）']);for(const f of exCols)aoa.push([f,b._extra[f]]);}
      }
      aoa.push([]);
    }else{
      const sc=state.schema[id];
      aoa.push([title]);
      aoa.push([sc.noSemFilter?'項目':'學期',...sc.cols]);
      const rows=(sc.noSemFilter||sem==='全部')?sc.rows:[sem];
      for(const r of rows){ aoa.push([r,...sc.cols.map(c=>((st.data[id]||{})[r]||{})[c]||'')]); }
      aoa.push([]);
    }
  }
  return aoa;
}
function exportStudentExcel(selSet){
  const st=curStudent();if(!st)return toast('沒有選取學生');
  const sel=selSet||new Set([...SECTION_ORDER.map(x=>x[0]),...(state.customSections||[]).map(c=>c.id)]);
  const sem=state.ui.sem;
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(buildStudentAOA(st,sel,sem));
  ws['!cols']=[{wch:12},{wch:30},{wch:12},{wch:30},{wch:10},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,sheetName(st,1));
  XLSX.writeFile(wb,safeName(`${st.no||''}_${st.name||'學生'}_${sem}`)+'.xlsx');
  toast('✓ 已匯出 Excel');
}
// 全班一次匯出，每位學生一個分頁
function exportClassExcel(selSet){
  if(!state.students.length)return toast('沒有學生');
  const sel=selSet||new Set([...SECTION_ORDER.map(x=>x[0]),...(state.customSections||[]).map(c=>c.id)]);
  const sem=state.ui.sem;
  const wb=XLSX.utils.book_new();
  const sorted=[...state.students].sort((a,b)=>(a.no||'').localeCompare(b.no||'','zh',{numeric:true}));
  const used={};
  sorted.forEach((st,i)=>{
    const ws=XLSX.utils.aoa_to_sheet(buildStudentAOA(st,sel,sem));
    ws['!cols']=[{wch:12},{wch:30},{wch:12},{wch:30},{wch:10},{wch:20}];
    let nm=sheetName(st,i+1); while(used[nm])nm=nm.slice(0,28)+'_'+(i+1); used[nm]=1;
    XLSX.utils.book_append_sheet(wb,ws,nm);
  });
  XLSX.writeFile(wb,safeName(`${state.meta.className||'班級'}_全班_${sem}`)+'.xlsx');
  toast(`✓ 已匯出全班 Excel（${sorted.length} 位，每生一分頁）`);
}
// Excel 分頁名稱（去除 Excel 不允許字元、限 31 字、確保非空）
function sheetName(st,idx){
  let n=`${st.no||''}_${st.name||''}`.replace(/[\\\/\?\*\[\]:]/g,'').trim();
  if(!n)n='學生'+idx;
  return n.slice(0,31);
}

/* 列印 / 匯出 前選擇要包含的大項目 */
function openSectionPicker(action){
  if(action!=='excelAll'&&!curStudent())return toast('沒有選取學生');
  if(action==='excelAll'&&!state.students.length)return toast('沒有學生');
  const secs=[...SECTION_ORDER.map(([id,title])=>[id,title]),...(state.customSections||[]).map(c=>[c.id,c.title])];
  const saved=state.ui.pickSecs;
  const isOn=id=> saved? saved.includes(id) : true;
  const rows=secs.map(([id,title])=>`<label style="display:block;padding:5px 2px;border-bottom:1px solid #f0f3f8"><input type="checkbox" class="pickchk" value="${id}" ${isOn(id)?'checked':''}> ${esc(title)}</label>`).join('');
  const titleMap={print:'🖨 選擇要列印的項目',excel:'📊 選擇要匯出 Excel 的項目',excelAll:`📚 全班匯出 Excel（${state.students.length} 位，每生一分頁）`};
  const btnMap={print:'列印',excel:'匯出',excelAll:'匯出全班'};
  $('#modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:440px">
    <h3>${titleMap[action]}<span class="x" onclick="closeModal()">×</span></h3>
    <div class="mbody">
      <div style="margin-bottom:8px"><button class="btn sm" onclick="pickAll(true)">全選</button> <button class="btn sm" onclick="pickAll(false)">全不選</button></div>
      ${rows}
      <div class="hint" style="margin-top:10px">學生姓名／座號標頭一律包含。各表格內容依目前「檢視學期」（<b>${esc(state.ui.sem)}</b>）；學測模考不分學期。</div>
    </div>
    <div class="mfoot"><button class="btn" onclick="closeModal()">取消</button><button class="btn pri" onclick="confirmPick('${action}')">${btnMap[action]}</button></div>
  </div></div>`;
}
function pickAll(on){document.querySelectorAll('.pickchk').forEach(c=>c.checked=on);}
function confirmPick(action){
  const sel=[...document.querySelectorAll('.pickchk:checked')].map(c=>c.value);
  if(!sel.length)return toast('請至少勾選一個項目');
  state.ui.pickSecs=sel; save();
  const set=new Set(sel);
  if(action==='excel'){ closeModal(); exportStudentExcel(set); }
  else if(action==='excelAll'){ closeModal(); exportClassExcel(set); }
  else doPrint(set);
}
function doPrint(set){
  const st=curStudent();
  const allSecs=[...SECTION_ORDER.map(x=>x[0]),...(state.customSections||[]).map(c=>c.id)];
  const hidden=[];
  for(const sec of allSecs){ if(!set.has(sec)){ const el=document.getElementById('card_'+sec); if(el){el.style.display='none';hidden.push(el);} } }
  // 列印抬頭
  const ph=document.getElementById('printHead');
  if(ph&&st)ph.innerHTML=`<div class="phline">${esc(state.meta.className||'')}　${esc(st.name||'')}（座號 ${esc(st.no||'')}）</div><div class="phsub">學期：${esc(state.ui.sem)}　導師：${esc(state.meta.teacher||'')}　列印日：${dstamp()}</div>`;
  closeModal();
  const oldTitle=document.title;
  if(st)document.title=safeName(`${st.no||''}_${st.name||'學生'}_${state.ui.sem}`); // PDF 預設檔名同 Excel
  setTimeout(()=>{ try{window.print();}finally{ hidden.forEach(el=>el.style.display=''); document.title=oldTitle; } },120);
}
function printStudent(){ openSectionPicker('print'); }

/* =========================================================
   8. 工具
   ========================================================= */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function safeName(s){return String(s).replace(/[\/\\:*?"<>|]/g,'').replace(/\s+/g,' ').trim()||'未命名';}
function closeModal(){$('#modalRoot').innerHTML='';}
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
function dstamp(){const d=new Date();return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
let toastT;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}

/* 鍵盤快捷：Alt+←/→ 切換上一位／下一位學生 */
document.addEventListener('keydown',e=>{
  if(e.altKey&&!e.ctrlKey&&!e.metaKey&&(e.key==='ArrowLeft'||e.key==='ArrowRight')){
    if(!state.students.length||!state.ui.currentId)return;
    e.preventDefault(); prevNext(e.key==='ArrowRight'?1:-1);
  }
});

/* 啟動 */
render();
</script>
